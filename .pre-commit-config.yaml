repos:
- repo: https://github.com/charliermarsh/ruff-pre-commit
  # Ruff version.
  rev: 'v0.2.2'
  hooks:
    - id: ruff
      args: [--fix, --exit-non-zero-on-fix, --extend-exclude, TCH]
    - id: ruff-format
- repo: https://github.com/rtts/djhtml
  rev: 3.0.11
  hooks:
    - id: djhtml
      # Pin tab width to 4 to match .editorconfig (djhtml otherwise guesses).
      args: [--tabwidth, "4"]
