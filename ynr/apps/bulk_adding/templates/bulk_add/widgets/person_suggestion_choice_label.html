{% if object %}
    Same as <a href="{{ object.get_absolute_url }}"
               target="_blank">
    {% if object.name == object.new_name %}
        <strong>{{ object.name }}</strong>
    {% else %}
        {{ object.name }}
    {% endif %}
</a>

    <br>
    <small>Name match rank {{ object.rank|floatformat }}
        {% if object.same_party %}
            <br>+ Party match
        {% endif %}
        {% if object.on_ballot %}
            <br>+ Ballot match
        {% endif %}
    </small>
{% endif %}
